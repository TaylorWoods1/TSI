name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      - name: Test
        run: cargo test --workspace

  gui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Test GUI crate
        run: cargo test -p spyder-gui
      - name: Build web UI
        working-directory: web
        run: npm ci && npm run build && npm test
      - name: E2E (Playwright)
        working-directory: web
        run: npx playwright install chromium --with-deps && npm run e2e

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.88.0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "python -> target"
      - name: Build + smoke
        working-directory: python
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -U pip
          pip install 'maturin==1.4.0'
          maturin develop --release
          python - <<'PY'
          from spyder import Robot
          r = Robot.rect(10, 6, 8)
          lens = r.ik(0, 0, 2)
          assert len(lens) == 4
          assert r.classify() == "RRPM"
          assert r.is_feasible(0, 0, 2)
          t = r.ik_tensions(0, 0, 2)
          assert len(t) == 4 and all(x > 0 for x in t)
          print("python smoke ok", lens[0], t[0])
          PY
      - name: Pytest bindings
        working-directory: python
        run: |
          source .venv/bin/activate
          pip install pytest
          pytest tests/ -q
